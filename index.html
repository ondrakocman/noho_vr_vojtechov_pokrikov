<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOHO – Vizualizace větrného parku</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Landing overlay ── */
    #landing {
      position: fixed; inset: 0; z-index: 9999;
      background: #efeae2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      transition: opacity .5s;
    }
    #landing.hidden { opacity: 0; pointer-events: none; }

    #landing .logo { width: min(60vw, 420px); margin-bottom: 48px; }

    #enter-vr-btn {
      padding: 18px 52px;
      font-size: 1.25rem; font-weight: 700;
      color: #fff; border: none; border-radius: 60px;
      background: linear-gradient(135deg, #249e6b, #cedc00);
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(36,158,107,.35);
      transition: transform .15s, box-shadow .15s;
      text-transform: uppercase; letter-spacing: .05em;
    }
    #enter-vr-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(36,158,107,.45);
    }

    /* ── Loading indicator ── */
    #loading-overlay {
      position: fixed; inset: 0; z-index: 9998;
      background: rgba(0,0,0,.85);
      display: none; align-items: center; justify-content: center;
      color: #fff; font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 1.4rem;
    }
    #loading-overlay.visible { display: flex; }
    .spinner {
      width: 48px; height: 48px; border: 4px solid rgba(255,255,255,.2);
      border-top-color: #cedc00; border-radius: 50%;
      animation: spin .8s linear infinite; margin-right: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* hide default A-Frame UI */
    .a-enter-vr { display: none !important; }
  </style>
</head>
<body>

<!-- ── Landing Page ── -->
<div id="landing">
  <img class="logo" src="assets/noho-logo.svg" alt="NOHO logo">
  <button id="enter-vr-btn">Vstoupit do VR</button>
  <p style="margin-top:24px;color:#666;font-family:'Segoe UI',sans-serif;font-size:.9rem;">
    Nasaďte Meta Quest 3 a klikněte na tlačítko
  </p>
</div>

<!-- ── Loading overlay ── -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <span>Načítání…</span>
</div>

<!-- ══════════════════════════════════════════════
     A-Frame custom components (must register BEFORE scene parses)
     ══════════════════════════════════════════════ -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script>
/* ── hover-color: highlight buttons on mouseenter / mouseleave ── */
AFRAME.registerComponent('hover-color', {
  schema: {
    base:  { type: 'color', default: '#249e6b' },
    hover: { type: 'color', default: '#2fc07e' }
  },
  init: function () {
    var el = this.el;
    var data = this.data;
    el.addEventListener('mouseenter', function () {
      el.setAttribute('material', 'color', data.hover);
    });
    el.addEventListener('mouseleave', function () {
      el.setAttribute('material', 'color', data.base);
    });
  }
});

/* ── panel-anchor: attach panel in front of camera each frame ── */
AFRAME.registerComponent('panel-anchor', {
  schema: {
    target: { type: 'selector' }
  },
  tick: function () {
    var cam = this.el.sceneEl.camera;
    if (!cam || !this.data.target) return;
    var panel = this.data.target.object3D;
    if (!panel) return;

    // Get camera world position & direction
    var camPos = new THREE.Vector3();
    var camDir = new THREE.Vector3();
    cam.getWorldPosition(camPos);
    cam.getWorldDirection(camDir);

    // Place panel 0.75m in front, 0.45m below eye level
    var panelPos = new THREE.Vector3();
    // Use only horizontal direction for placement
    var hDir = new THREE.Vector3(camDir.x, 0, camDir.z).normalize();
    panelPos.copy(camPos).add(hDir.multiplyScalar(0.72));
    panelPos.y = camPos.y - 0.45;
    panel.position.copy(panelPos);

    // Make panel face camera (only Y rotation)
    var lookTarget = new THREE.Vector3(camPos.x, panelPos.y, camPos.z);
    panel.lookAt(lookTarget);
    // Tilt slightly towards user
    panel.rotateX(-0.5);
  }
});

/* ── head-pitch-toggle: show/hide panel based on head pitch ── */
AFRAME.registerComponent('head-pitch-toggle', {
  schema: {
    target:    { type: 'selector' },
    showBelow: { type: 'number', default: -30 },  // degrees
  },
  init: function () {
    this._hidden = false;
    this._cooldown = 0;
  },
  tick: function (t) {
    if (t < this._cooldown) return;
    var cam = this.el.sceneEl.camera;
    if (!cam) return;

    // Get camera pitch
    var euler = new THREE.Euler();
    euler.setFromQuaternion(cam.quaternion, 'YXZ');
    var pitchDeg = THREE.MathUtils.radToDeg(euler.x);

    var target = this.data.target;
    if (!target) return;

    if (this._hidden && pitchDeg < this.data.showBelow) {
      this._hidden = false;
      target.setAttribute('visible', true);
      this._cooldown = t + 1000;
    }
  }
});

/* ── Rounded plane primitive ── */
AFRAME.registerPrimitive('a-rounded', {
  defaultComponents: {
    geometry: { primitive: 'plane', width: 1, height: 1 },
    material: { color: '#333', opacity: 0.9, transparent: true, shader: 'flat', side: 'double' }
  },
  mappings: {
    width:   'geometry.width',
    height:  'geometry.height',
    color:   'material.color',
    opacity: 'material.opacity'
  }
});
</script>

<!-- ══════════════════════════════════════════════
     A-Frame Scene
     ══════════════════════════════════════════════ -->
<a-scene
  vr-mode-ui="enabled: false"
  renderer="colorManagement: true; sortObjects: true; antialias: true"
  loading-screen="enabled: false"
  webxr="requiredFeatures: local-floor"
  head-pitch-toggle="target: #vr-panel; showBelow: -28"
>
  <!-- Assets -->
  <a-assets timeout="90000">
    <img id="sky-vojtechov"          src="assets/static_vojtechov.jpg"          crossorigin="anonymous">
    <img id="sky-vojtechov-pokrikov" src="assets/static_vojtechov_pokrikov.jpg" crossorigin="anonymous">
    <video id="vid-vojtechov"        src="assets/video_vojtechov.mp4"           crossorigin="anonymous"
           playsinline loop muted preload="auto"></video>
  </a-assets>

  <!-- Sky sphere – starts hidden -->
  <a-sky id="sky" src="#sky-vojtechov" rotation="0 0 0" visible="false"></a-sky>

  <!-- Camera rig -->
  <a-entity id="camera-rig">
    <a-camera id="cam" look-controls="pointerLockEnabled:false" wasd-controls="enabled:false"
              panel-anchor="target: #vr-panel">
      <!-- Gaze cursor for panel interaction (fallback if no controllers) -->
      <a-entity id="gaze-cursor"
                cursor="fuse:true;fuseTimeout:1500"
                raycaster="objects:.btn; far:2"
                position="0 0 -0.8"
                geometry="primitive:ring;radiusInner:0.006;radiusOuter:0.01"
                material="color:#cedc00;shader:flat"
                animation__fuse="property:scale;startEvents:fusing;from:1 1 1;to:0.3 0.3 0.3;dur:1500"
                animation__reset="property:scale;startEvents:mouseleave;to:1 1 1;dur:200">
      </a-entity>
    </a-camera>
  </a-entity>

  <!-- Quest 3 controller support -->
  <a-entity id="lhand" laser-controls="hand:left"
            raycaster="objects:.btn; far:3; lineColor:#cedc00; lineOpacity:0.6"></a-entity>
  <a-entity id="rhand" laser-controls="hand:right"
            raycaster="objects:.btn; far:3; lineColor:#cedc00; lineOpacity:0.6"></a-entity>

  <!-- ── VR Control Panel (world-anchored, repositioned by panel-anchor) ── -->
  <a-entity id="vr-panel" visible="false" position="0 1.1 -0.72" rotation="-30 0 0">

    <!-- Panel background -->
    <a-rounded width="0.72" height="0.48" color="#1a1a2e" opacity="0.92"
               position="0 0 -0.002"></a-rounded>

    <!-- Title -->
    <a-text value="Větrný park" color="#cedc00"
            align="center" width="1.1" anchor="center"
            position="0 0.17 0"></a-text>

    <!-- Variant button -->
    <a-entity id="btn-variant" class="btn"
              geometry="primitive:plane;width:0.6;height:0.09"
              material="color:#249e6b;shader:flat"
              hover-color="base:#249e6b;hover:#2fc07e"
              position="0 0.05 0.001">
      <a-text id="btn-variant-text" value="Vojtěchov"
              color="#fff" align="center" width="1.3" anchor="center"
              position="0 0 0.001"></a-text>
    </a-entity>

    <!-- Animated mode button -->
    <a-entity id="btn-animate" class="btn"
              geometry="primitive:plane;width:0.6;height:0.09"
              material="color:#249e6b;shader:flat"
              hover-color="base:#249e6b;hover:#2fc07e"
              position="0 -0.07 0.001">
      <a-text id="btn-animate-text" value="Animace: Vypnuto"
              color="#fff" align="center" width="1.3" anchor="center"
              position="0 0 0.001"></a-text>
    </a-entity>

    <!-- Hide panel button -->
    <a-entity id="btn-hide" class="btn"
              geometry="primitive:plane;width:0.6;height:0.07"
              material="color:#3a3a3a;shader:flat"
              hover-color="base:#3a3a3a;hover:#555"
              position="0 -0.19 0.001">
      <a-text value="Skrýt panel"
              color="#999" align="center" width="1.4" anchor="center"
              position="0 0 0.001"></a-text>
    </a-entity>
  </a-entity>

</a-scene>

<!-- ══════════════════════════════════════════════
     App Logic
     ══════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';

  /* ── State ── */
  var VARIANTS = ['vojtechov', 'vojtechov_pokrikov'];
  var VARIANT_LABELS = {
    vojtechov: 'Vojtěchov',
    vojtechov_pokrikov: 'Vojtěchov + Pokřikov'
  };
  var currentVariant = 0;
  var animatedMode = false;
  var panelVisible = true;
  var transitioning = false;

  /* ── DOM refs ── */
  var landing   = document.getElementById('landing');
  var loading   = document.getElementById('loading-overlay');
  var scene     = document.querySelector('a-scene');
  var sky       = document.getElementById('sky');
  var panel     = document.getElementById('vr-panel');
  var btnVar    = document.getElementById('btn-variant');
  var btnAnim   = document.getElementById('btn-animate');
  var btnHide   = document.getElementById('btn-hide');
  var varText   = document.getElementById('btn-variant-text');
  var animText  = document.getElementById('btn-animate-text');
  var video     = document.getElementById('vid-vojtechov');

  /* ── Helpers ── */
  function showLoading()  { loading.classList.add('visible'); }
  function hideLoading()  { loading.classList.remove('visible'); }
  function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

  /* ── Switch sky content with black-out transition ── */
  async function setSky() {
    if (transitioning) return;
    transitioning = true;

    // 1. Hide sky instantly (shows black)
    sky.setAttribute('visible', false);
    await sleep(120);

    // 2. Pause & reset video
    try { video.pause(); video.currentTime = 0; } catch (e) {}

    // 3. Determine new source
    var v = VARIANTS[currentVariant];

    if (animatedMode && v === 'vojtechov') {
      // Video mode
      sky.setAttribute('material', 'shader', 'flat');
      sky.setAttribute('material', 'src', '#vid-vojtechov');
      sky.removeAttribute('src');
      await sleep(100);
      try { await video.play(); } catch (e) { console.warn('Video play failed:', e); }
    } else {
      // Static image mode – clear any video material first
      sky.removeAttribute('material');
      await sleep(50);
      var imgId = v === 'vojtechov' ? '#sky-vojtechov' : '#sky-vojtechov-pokrikov';
      sky.setAttribute('src', imgId);
    }

    // 4. Let GPU upload texture
    await sleep(250);

    // 5. Show sky
    sky.setAttribute('visible', true);
    transitioning = false;
  }

  /* ── Update button labels ── */
  function updateLabels() {
    varText.setAttribute('value', VARIANT_LABELS[VARIANTS[currentVariant]]);

    if (animatedMode && VARIANTS[currentVariant] === 'vojtechov') {
      animText.setAttribute('value', 'Animace: Zapnuto');
    } else if (animatedMode) {
      animText.setAttribute('value', 'Animace: Nedostupná');
    } else {
      animText.setAttribute('value', 'Animace: Vypnuto');
    }
  }

  /* ── Button handlers ── */
  btnVar.addEventListener('click', async function () {
    if (transitioning) return;
    currentVariant = (currentVariant + 1) % VARIANTS.length;
    updateLabels();
    await setSky();
  });

  btnAnim.addEventListener('click', async function () {
    if (transitioning) return;
    animatedMode = !animatedMode;
    updateLabels();
    await setSky();
  });

  btnHide.addEventListener('click', function () {
    panelVisible = false;
    panel.setAttribute('visible', false);
    // The head-pitch-toggle component on the scene will re-show it when user looks down
    var comp = scene.components['head-pitch-toggle'];
    if (comp) comp._hidden = true;
  });

  /* ── Enter VR ── */
  document.getElementById('enter-vr-btn').addEventListener('click', async function () {
    showLoading();

    // Wait for scene to load
    if (!scene.hasLoaded) {
      await new Promise(function(r) { scene.addEventListener('loaded', r, { once: true }); });
    }

    // Attempt immersive VR
    try {
      await scene.enterVR();
    } catch (e) {
      console.warn('Could not enter immersive VR, continuing in 360° mode:', e);
    }

    // Show content
    await sleep(300);
    updateLabels();
    sky.setAttribute('visible', true);
    panel.setAttribute('visible', true);
    panelVisible = true;
    landing.classList.add('hidden');
    hideLoading();
  });

  /* ── Exit VR ── */
  scene.addEventListener('exit-vr', function () {
    sky.setAttribute('visible', false);
    panel.setAttribute('visible', false);
    try { video.pause(); } catch (e) {}
    landing.classList.remove('hidden');
  });

  /* ── Disable gaze cursor when controllers detected ── */
  scene.addEventListener('controllerconnected', function () {
    var gc = document.getElementById('gaze-cursor');
    if (gc) {
      gc.setAttribute('visible', false);
      gc.removeAttribute('cursor');
      gc.removeAttribute('raycaster');
    }
  });

})();
</script>

</body>
</html>
