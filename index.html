<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOHO – Vizualizace větrného parku</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

    /* ── Landing ── */
    #landing {
      position: fixed; inset: 0; z-index: 9999;
      background: #efeae2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity .4s;
    }
    #landing.hidden { opacity: 0; pointer-events: none; }
    #landing .logo { width: min(60vw, 420px); margin-bottom: 48px; }
    #enter-vr-btn {
      padding: 18px 52px;
      font-size: 1.25rem; font-weight: 700;
      color: #fff; border: none; border-radius: 60px;
      background: linear-gradient(135deg, #249e6b, #cedc00);
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(36,158,107,.35);
      transition: transform .15s, box-shadow .15s;
      text-transform: uppercase; letter-spacing: .05em;
    }
    #enter-vr-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(36,158,107,.45);
    }
    #landing .hint { margin-top: 24px; color: #888; font-size: .85rem; }

    /* ── Loading ── */
    #loading-overlay {
      position: fixed; inset: 0; z-index: 9998;
      background: rgba(0,0,0,.85);
      display: none; align-items: center; justify-content: center;
      color: #fff; font-size: 1.4rem;
    }
    #loading-overlay.visible { display: flex; }
    .spinner {
      width: 44px; height: 44px; border: 4px solid rgba(255,255,255,.15);
      border-top-color: #cedc00; border-radius: 50%;
      animation: spin .7s linear infinite; margin-right: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Hide A-Frame default VR button ── */
    .a-enter-vr { display: none !important; }

    /* ═══════════════════════════════════════════
       VR DOM Overlay Panel
       ═══════════════════════════════════════════ */
    #vr-overlay {
      display: none;
      position: fixed;
      bottom: 40px; left: 50%; transform: translateX(-50%);
      z-index: 10000;
      pointer-events: auto;
    }
    #vr-overlay.active { display: block; }

    .vr-panel {
      background: rgba(239, 234, 226, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 24px 28px 20px;
      min-width: 340px;
      box-shadow: 0 8px 40px rgba(0,0,0,.25), 0 0 0 1px rgba(36,158,107,.2);
      text-align: center;
    }

    .vr-panel .panel-title {
      font-size: .7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .15em;
      color: #003366; opacity: .6;
      margin-bottom: 16px;
    }

    .vr-panel .panel-section {
      margin-bottom: 14px;
    }
    .vr-panel .panel-label {
      font-size: .65rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .1em;
      color: #888; margin-bottom: 8px;
    }

    .vr-btn {
      display: block; width: 100%;
      padding: 14px 20px;
      border: none; border-radius: 14px;
      font-size: .95rem; font-weight: 600;
      cursor: pointer;
      transition: transform .1s, box-shadow .1s, opacity .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .vr-btn:active {
      transform: scale(0.96);
    }

    .vr-btn-primary {
      color: #fff;
      background: linear-gradient(135deg, #249e6b, #1db86e);
      box-shadow: 0 4px 16px rgba(36,158,107,.3);
    }
    .vr-btn-primary:active {
      background: linear-gradient(135deg, #1e8a5e, #178f58);
    }

    .vr-btn-accent {
      color: #003366;
      background: linear-gradient(135deg, #cedc00, #b8c600);
      box-shadow: 0 4px 16px rgba(206,220,0,.25);
    }
    .vr-btn-accent:active {
      background: linear-gradient(135deg, #b5c200, #a0ab00);
    }

    .vr-btn-muted {
      color: #999;
      background: transparent;
      font-size: .8rem;
      padding: 10px;
    }
    .vr-btn-muted:active { color: #666; }

    .vr-divider {
      height: 1px;
      background: rgba(0,51,102,.08);
      margin: 6px 0;
      border: none;
    }

    /* Status indicator dot */
    .status-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; margin-right: 8px;
      vertical-align: middle;
    }
    .status-dot.on  { background: #249e6b; box-shadow: 0 0 6px rgba(36,158,107,.5); }
    .status-dot.off { background: #ccc; }
  </style>
</head>
<body>

<!-- ── Landing Page ── -->
<div id="landing">
  <img class="logo" src="assets/noho-logo.svg" alt="NOHO logo">
  <button id="enter-vr-btn">Vstoupit do VR</button>
  <p class="hint">Nasaďte Meta Quest 3 a klikněte na tlačítko</p>
</div>

<!-- ── Loading ── -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <span>Načítání…</span>
</div>

<!-- ═══════════════════════════════════════════════
     VR Overlay Panel (real HTML — native Quest interaction)
     ═══════════════════════════════════════════════ -->
<div id="vr-overlay">
  <div class="vr-panel">
    <div class="panel-title">Větrný park — vizualizace</div>

    <div class="panel-section">
      <div class="panel-label">Varianta</div>
      <button id="btn-variant" class="vr-btn vr-btn-primary">Vojtěchov</button>
    </div>

    <div class="panel-section">
      <div class="panel-label">Režim zobrazení</div>
      <button id="btn-animate" class="vr-btn vr-btn-accent">
        <span class="status-dot off"></span>Animace
      </button>
    </div>

    <hr class="vr-divider">
    <button id="btn-hide" class="vr-btn vr-btn-muted">Skrýt panel ▾</button>
  </div>
</div>

<!-- ═══ A-Frame (load before scene) ═══ -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script>
/* ── head-pitch-show: re-show the DOM overlay when user looks down ── */
AFRAME.registerComponent('head-pitch-show', {
  schema: { threshold: { type: 'number', default: -25 } },
  init: function () {
    this._cd = 0;
    this._euler = new THREE.Euler();
  },
  tick: function (t) {
    if (t < this._cd) return;
    var cam = this.el.sceneEl.camera;
    if (!cam) return;
    this._euler.setFromQuaternion(cam.quaternion, 'YXZ');
    var pitchDeg = THREE.MathUtils.radToDeg(this._euler.x);
    var overlay = document.getElementById('vr-overlay');
    if (pitchDeg < this.data.threshold && !overlay.classList.contains('active')) {
      if (window._vrPanelHidden) {
        overlay.classList.add('active');
        window._vrPanelHidden = false;
        this._cd = t + 2000;
      }
    }
  }
});
</script>

<!-- ═══ A-Frame Scene ═══ -->
<a-scene
  vr-mode-ui="enabled: false"
  renderer="colorManagement: true; sortObjects: true; antialias: true"
  loading-screen="enabled: false"
  webxr="requiredFeatures: local-floor;
         optionalFeatures: hand-tracking, dom-overlay;
         overlayElement: #vr-overlay"
  head-pitch-show="threshold: -25"
>
  <a-assets timeout="90000">
    <img id="img-vojtechov"          src="assets/static_vojtechov.jpg"          crossorigin="anonymous">
    <img id="img-vojtechov-pokrikov" src="assets/static_vojtechov_pokrikov.jpg" crossorigin="anonymous">
    <video id="vid-vojtechov"        src="assets/video_vojtechov.mp4"           crossorigin="anonymous"
           playsinline loop muted preload="auto"></video>
  </a-assets>

  <!-- Two skies for clean transition -->
  <a-sky id="sky-static" src="#img-vojtechov" visible="false"></a-sky>
  <a-sky id="sky-video"  visible="false"
         material="shader:flat; src:#vid-vojtechov; side:back"></a-sky>

  <!-- Camera -->
  <a-entity id="camera-rig">
    <a-camera look-controls="pointerLockEnabled:false" wasd-controls="enabled:false"></a-camera>
  </a-entity>
</a-scene>

<!-- ═══ App Logic ═══ -->
<script>
(function () {
  'use strict';

  var VARIANTS = ['vojtechov', 'vojtechov_pokrikov'];
  var LABELS   = { vojtechov: 'Vojtěchov', vojtechov_pokrikov: 'Vojtěchov + Pokřikov' };
  var idx = 0, animated = false, busy = false;
  window._vrPanelHidden = false;

  var landing   = document.getElementById('landing');
  var loading   = document.getElementById('loading-overlay');
  var overlay   = document.getElementById('vr-overlay');
  var scene     = document.querySelector('a-scene');
  var skyS      = document.getElementById('sky-static');
  var skyV      = document.getElementById('sky-video');
  var btnVar    = document.getElementById('btn-variant');
  var btnAnim   = document.getElementById('btn-animate');
  var btnHide   = document.getElementById('btn-hide');
  var video     = document.getElementById('vid-vojtechov');
  var dot       = btnAnim.querySelector('.status-dot');

  function wait(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }

  /* ── Sky transition ── */
  async function setSky() {
    if (busy) return;
    busy = true;

    skyS.object3D.visible = false;
    skyV.object3D.visible = false;
    try { video.pause(); video.currentTime = 0; } catch (e) {}
    await wait(150);

    var v = VARIANTS[idx];
    if (animated && v === 'vojtechov') {
      try { await video.play(); } catch (e) { console.warn('Video:', e); }
      await wait(100);
      skyV.object3D.visible = true;
    } else {
      skyS.setAttribute('src', v === 'vojtechov' ? '#img-vojtechov' : '#img-vojtechov-pokrikov');
      await wait(200);
      skyS.object3D.visible = true;
    }
    busy = false;
  }

  function updateUI() {
    btnVar.textContent = LABELS[VARIANTS[idx]];

    if (animated && VARIANTS[idx] === 'vojtechov') {
      dot.className = 'status-dot on';
      btnAnim.innerHTML = '';
      btnAnim.appendChild(dot);
      btnAnim.append(' Animace zapnuta');
    } else if (animated) {
      dot.className = 'status-dot off';
      btnAnim.innerHTML = '';
      btnAnim.appendChild(dot);
      btnAnim.append(' Animace nedostupná');
    } else {
      dot.className = 'status-dot off';
      btnAnim.innerHTML = '';
      btnAnim.appendChild(dot);
      btnAnim.append(' Animace');
    }
  }

  /* ── Buttons ── */
  btnVar.addEventListener('click', function (e) {
    e.preventDefault(); e.stopPropagation();
    if (busy) return;
    idx = (idx + 1) % VARIANTS.length;
    updateUI(); setSky();
  });

  btnAnim.addEventListener('click', function (e) {
    e.preventDefault(); e.stopPropagation();
    if (busy) return;
    animated = !animated;
    updateUI(); setSky();
  });

  btnHide.addEventListener('click', function (e) {
    e.preventDefault(); e.stopPropagation();
    overlay.classList.remove('active');
    window._vrPanelHidden = true;
  });

  /* ── Enter VR ── */
  document.getElementById('enter-vr-btn').addEventListener('click', async function () {
    loading.classList.add('visible');

    if (!scene.hasLoaded) {
      await new Promise(function (r) { scene.addEventListener('loaded', r, { once: true }); });
    }

    try { await scene.enterVR(); }
    catch (e) { console.warn('VR entry fallback:', e); }

    await wait(500);
    idx = 0; animated = false;
    updateUI();
    skyS.setAttribute('src', '#img-vojtechov');
    await wait(200);
    skyS.object3D.visible = true;
    skyV.object3D.visible = false;

    overlay.classList.add('active');
    landing.classList.add('hidden');
    loading.classList.remove('visible');
  });

  /* ── Exit VR ── */
  scene.addEventListener('exit-vr', function () {
    skyS.object3D.visible = false;
    skyV.object3D.visible = false;
    overlay.classList.remove('active');
    try { video.pause(); } catch (e) {}
    landing.classList.remove('hidden');
  });

})();
</script>

</body>
</html>
